name: TAS v70.20 Community gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify generated folders are not tracked
        shell: bash
        run: |
          test -z "$(git ls-files node_modules dist dist-editions)"
      - name: Install exact dependency lock
        run: npm ci --no-audit --no-fund
      - name: Build protected core and independent editions
        run: npm run validate
      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: tas-v70-20-community-evidence
          path: |
            TAS_V70_20_COMMUNITY_VALIDATION_REPORT.md
            FOUNDATION_BASELINE_MANIFEST.json
            EXPECTED_AURORA_ASSET_HASHES.txt
            config/edition-entitlements.json
            dist-editions/*/TAS_EDITION_MANIFEST.json
