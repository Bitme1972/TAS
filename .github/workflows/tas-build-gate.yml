name: TAS Foundation Lock build gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify generated folders are not tracked
        shell: bash
        run: |
          test -z "$(git ls-files node_modules dist)"
      - name: Install exact dependency lock
        run: npm ci --no-audit --no-fund
      - name: Build and run all TAS gates
        run: npm run validate
      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: tas-v70-18-1-foundation-lock-evidence
          path: |
            TAS_V70_18_1_FOUNDATION_LOCK_VALIDATION_REPORT.md
            FOUNDATION_BASELINE_MANIFEST.json
            EXPECTED_AURORA_ASSET_HASHES.txt
